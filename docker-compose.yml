services:
  postgres:
    image: postgres:17-alpine
    container_name: nexus_noir_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nexus_noir}
      POSTGRES_USER: ${DB_USERNAME:-nexus_noir}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-nexus_noir}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus_noir_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./docker/data/redis:/data
